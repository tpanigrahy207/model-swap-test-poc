<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise control plane with replaceable endpoints</title>
  <desc id="desc">Enterprise-owned control layers route requests to replaceable model endpoints.</desc>
  <rect width="960" height="440" fill="#f7f8fa"/>
  <rect x="52" y="52" width="610" height="336" rx="8" fill="#ffffff" stroke="#1f2937" stroke-width="2"/>
  <text x="72" y="88" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">Enterprise-owned control plane</text>
  <g font-family="Arial, sans-serif" font-size="15" fill="#111827">
    <rect x="82" y="116" width="520" height="34" rx="5" fill="#e8f0f7" stroke="#64748b"/>
    <text x="104" y="138">Request and identity</text>
    <rect x="82" y="164" width="520" height="34" rx="5" fill="#e8f0f7" stroke="#64748b"/>
    <text x="104" y="186">Policy and context gateway</text>
    <rect x="82" y="212" width="520" height="34" rx="5" fill="#e8f0f7" stroke="#64748b"/>
    <text x="104" y="234">Routing and budget</text>
    <rect x="82" y="260" width="520" height="34" rx="5" fill="#e8f0f7" stroke="#64748b"/>
    <text x="104" y="282">Enterprise state</text>
    <rect x="82" y="308" width="520" height="34" rx="5" fill="#e8f0f7" stroke="#64748b"/>
    <text x="104" y="330">Evaluation and evidence</text>
  </g>
  <path d="M662 220 H735" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
  <g font-family="Arial, sans-serif" fill="#111827">
    <text x="744" y="94" font-size="20" font-weight="700">Replaceable endpoints</text>
    <rect x="740" y="124" width="170" height="52" rx="8" fill="#fff7ed" stroke="#9a3412"/>
    <text x="762" y="156" font-size="15">External API</text>
    <rect x="740" y="198" width="170" height="52" rx="8" fill="#ecfdf5" stroke="#166534"/>
    <text x="762" y="230" font-size="15">Managed tenant</text>
    <rect x="740" y="272" width="170" height="52" rx="8" fill="#eef2ff" stroke="#3730a3"/>
    <text x="762" y="304" font-size="15">Private / edge</text>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>
</svg>
